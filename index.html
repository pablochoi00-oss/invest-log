<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0b">
<title>투자 일지</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ⚠️  설정 필요: 아래 세 줄에 본인 값을 입력하세요
   텍스트편집기(메모장)로 이 파일을 열어서 수정하세요
   ============================================================ */

/* 설정은 JS 상단 CONFIG 객체에 있습니다 */

:root {
  --bg:      #0a0a0b;
  --bg2:     #111113;
  --bg3:     #18181b;
  --bg4:     #222226;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text:    #ececec;
  --text2:   #888;
  --text3:   #444;
  --stock:   #60a5fa;
  --coin:    #a78bfa;
  --etf:     #34d399;
  --buy:     #34d399;
  --sell:    #f87171;
  --accent:  #60a5fa;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Noto Sans KR', sans-serif;
  --r-sm:    10px;
  --r-md:    14px;
  --r-lg:    18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--sans);
  overscroll-behavior: none; -webkit-overflow-scrolling: touch;
}

/* ── LAYOUT ── */
.shell { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }

.topbar {
  padding: 16px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.app-name { font-family: var(--mono); font-size: 13px; letter-spacing: 0.12em; color: var(--text3); }
.sync-chip {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 20px; padding: 4px 10px; cursor: pointer;
  transition: all 0.2s;
}
.sync-chip:active { opacity: 0.7; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.ok { background: var(--buy); box-shadow: 0 0 6px var(--buy); }
.sync-dot.err { background: var(--sell); }
.sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.pages { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto; padding: 16px 18px 110px;
  display: none; -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }

/* ── BOTTOM NAV ── */
.bnav {
  flex-shrink: 0;
  display: flex; border-top: 0.5px solid var(--border);
  background: var(--bg); z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 8px);
}
.bn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 10px 0 6px;
  border: none; background: none; cursor: pointer;
  color: var(--text3); font-size: 10px; font-family: var(--sans);
  letter-spacing: 0.04em; transition: color 0.2s;
}
.bn.on { color: var(--accent); }
.bn svg { width: 20px; height: 20px; }
.bn.on svg { stroke: var(--accent); }

/* ── CARDS ── */
.card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--r-lg); padding: 18px 16px; margin-bottom: 12px;
}
.card-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.1em; margin-bottom: 12px;
}

/* ── METRICS ── */
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.mcard {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--r-md); padding: 14px 13px;
}
.mlabel { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 6px; }
.mval { font-family: var(--mono); font-size: 18px; font-weight: 400; }
.mval.pos { color: var(--buy); }
.mval.neg { color: var(--sell); }

/* ── FORM ── */
.seg {
  display: flex; background: var(--bg3);
  border-radius: var(--r-sm); padding: 3px; gap: 2px; margin-bottom: 16px;
}
.sb {
  flex: 1; padding: 8px 2px; font-size: 11px; border: none;
  border-radius: 8px; cursor: pointer; background: none;
  color: var(--text3); font-family: var(--sans); text-align: center;
  transition: all 0.2s; line-height: 1.3;
}
.sb.on { background: var(--bg); color: var(--text); box-shadow: 0 0 0 0.5px var(--border2); }

.trow { display: flex; gap: 8px; margin-bottom: 16px; }
.tbtn {
  flex: 1; padding: 13px; font-size: 14px; font-weight: 500;
  border: 0.5px solid var(--border2); border-radius: var(--r-md);
  cursor: pointer; background: none; color: var(--text3);
  font-family: var(--sans); transition: all 0.2s;
}
.tbtn.buy.on  { background: rgba(52,211,153,0.1); border-color: var(--buy); color: var(--buy); }
.tbtn.sell.on { background: rgba(248,113,113,0.1); border-color: var(--sell); color: var(--sell); }

.fl { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.fl label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
.fl input, .fl select {
  font-size: 15px; padding: 12px 13px;
  border: 0.5px solid var(--border2); border-radius: var(--r-md);
  background: var(--bg3); color: var(--text);
  width: 100%; font-family: var(--sans);
  -webkit-appearance: none; appearance: none; outline: none;
  transition: border-color 0.2s;
}
.fl input:focus, .fl select:focus { border-color: var(--accent); }
.r2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.sbtn {
  width: 100%; padding: 15px; font-size: 15px; font-weight: 500;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--r-md); cursor: pointer; font-family: var(--sans);
  transition: opacity 0.2s; letter-spacing: 0.02em;
}
.sbtn:active { opacity: 0.75; }
.sbtn.ghost {
  background: var(--bg3); color: var(--text2);
  border: 0.5px solid var(--border2);
}
.smsg { font-family: var(--mono); font-size: 11px; color: var(--buy); text-align: center; margin-top: 8px; min-height: 16px; }
.errmsg { color: var(--sell); }

/* ── LIST ── */
.eitem {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 14px 0; border-bottom: 0.5px solid var(--border);
}
.eitem:last-child { border-bottom: none; }
.pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-family: var(--mono); letter-spacing: 0.05em;
}
.p-stock { background: rgba(96,165,250,0.1); color: var(--stock); }
.p-coin  { background: rgba(167,139,250,0.1); color: var(--coin); }
.p-etf   { background: rgba(52,211,153,0.1);  color: var(--etf); }
.p-buy   { background: rgba(52,211,153,0.1);  color: var(--buy); }
.p-sell  { background: rgba(248,113,113,0.1); color: var(--sell); }

.eamt  { font-family: var(--mono); font-size: 16px; margin-top: 5px; }
.edk   { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 3px; }
.delbtn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; flex-shrink: 0; }
.delbtn:active { color: var(--sell); }

/* ── FILTERS ── */
.fscroll {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
  margin-bottom: 14px; scrollbar-width: none;
}
.fscroll::-webkit-scrollbar { display: none; }
.fbtn {
  flex-shrink: 0; padding: 5px 13px; font-size: 11px;
  border: 0.5px solid var(--border2); border-radius: 20px;
  cursor: pointer; background: none; color: var(--text3);
  font-family: var(--mono); white-space: nowrap; transition: all 0.2s;
}
.fbtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── CHARTS ── */
.cwrap { position: relative; width: 100%; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
.legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); font-family: var(--mono); }
.legend i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

/* ── TIMELINE ── */
.tlitem { position: relative; padding-left: 16px; margin-bottom: 16px; }
.tldot { position: absolute; left: 0; top: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--border2); }
.tlline { position: absolute; left: 2.5px; top: 10px; bottom: -16px; width: 0.5px; background: var(--border); }
.tlitem:last-child .tlline { display: none; }
.tlyr { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 6px; }

/* ── GOAL ── */
.gbar-bg { height: 6px; background: var(--bg3); border-radius: 3px; margin: 8px 0 4px; overflow: hidden; }
.gbar-fill { height: 6px; border-radius: 3px; background: var(--accent); transition: width 0.6s ease; }
.abar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.abar-fill { height: 4px; border-radius: 2px; }

/* ── EMPTY ── */
.empty { text-align: center; color: var(--text3); font-size: 13px; padding: 40px 0; font-family: var(--mono); }

/* ── SECTION TITLE ── */
.stitle { font-size: 12px; font-weight: 500; color: var(--text3); margin: 18px 0 10px; font-family: var(--mono); letter-spacing: 0.06em; }

select option { background: var(--bg3); color: var(--text); }

/* ── LOADING OVERLAY ── */
.overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; transition: opacity 0.4s;
}
.overlay.hide { opacity: 0; pointer-events: none; }
.ov-logo { font-family: var(--mono); font-size: 14px; letter-spacing: 0.15em; color: var(--text3); margin-bottom: 20px; }
.ov-bar { width: 120px; height: 1px; background: var(--border2); border-radius: 1px; overflow: hidden; }
.ov-fill { height: 1px; background: var(--accent); border-radius: 1px; animation: load 1.2s ease forwards; }
@keyframes load { from{width:0} to{width:100%} }
</style>
</head>

<script>
/* ============================================================
   ⚠️  여기에 본인 값을 입력하세요 (텍스트편집기로 수정)
   ============================================================ */
const CONFIG = {
  SHEET_ID:     "1nVIrW-8MlDMSCSJf5iJ2-XhCsa9zXOYIAeV8-a9Re5E",
  CLIENT_EMAIL: "새로발급받은이메일@invest-log-493311.iam.gserviceaccount.com",
  PRIVATE_KEY:  "-----BEGIN PRIVATE KEY-----\n...내용...\n-----END PRIVATE KEY-----\n"
};
/* ============================================================ */

const GOAL_KEY  = 'iv_goal';
const ALLOC_KEY = 'iv_alloc';

let entries    = [];
let goal       = JSON.parse(localStorage.getItem(GOAL_KEY)  || '{}');
let allocGoal  = JSON.parse(localStorage.getItem(ALLOC_KEY) || '{}');
let tradeType  = '매수';
let inputMode  = 'year';
let histFilter = '전체';
let charts     = {};
let syncing    = false;

/* ── Google Sheets JWT Auth ── */
async function getAccessToken() {
  const now = Math.floor(Date.now() / 1000);
  const header  = { alg: 'RS256', typ: 'JWT' };
  const payload = {
    iss: CONFIG.CLIENT_EMAIL,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600, iat: now
  };
  const enc = s => btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const unsigned = enc(header) + '.' + enc(payload);
  const key = await importPrivateKey(CONFIG.PRIVATE_KEY);
  const sig = await crypto.subtle.sign({ name:'RSASSA-PKCS1-v1_5' }, key, new TextEncoder().encode(unsigned));
  const jwt = unsigned + '.' + btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  if (!data.access_token) throw new Error('토큰 발급 실패');
  return data.access_token;
}

async function importPrivateKey(pem) {
  const raw = pem.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  const buf = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
  return crypto.subtle.importKey('pkcs8', buf, { name:'RSASSA-PKCS1-v1_5', hash:'SHA-256' }, false, ['sign']);
}

async function sheetsRequest(method, path, body) {
  const token = await getAccessToken();
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}${path}`, {
    method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(`Sheets API 오류: ${res.status}`);
  return res.json();
}

/* ── Sync UI ── */
function setSyncState(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

async function syncNow() {
  if (syncing) return;
  syncing = true;
  setSyncState('loading', '동기화 중...');
  try {
    await loadFromSheet();
    setSyncState('ok', '동기화 완료');
    renderCurrent();
  } catch(e) {
    setSyncState('err', '연결 실패');
    console.error(e);
  }
  syncing = false;
}

async function loadFromSheet() {
  const res = await sheetsRequest('GET', '/values/entries!A2:F10000');
  const rows = res.values || [];
  entries = rows
    .filter(r => r[0])
    .map(r => ({
      id:    parseInt(r[0]) || Date.now(),
      dk:    r[1] || '',
      asset: r[2] || '주식',
      amt:   parseFloat(r[3]) || 0,
      type:  r[4] || '매수',
      mode:  r[5] || 'year'
    }))
    .sort((a,b) => a.dk.localeCompare(b.dk));
}

async function appendRow(entry) {
  await sheetsRequest('POST', '/values/entries!A:F:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', {
    values: [[entry.id, entry.dk, entry.asset, entry.amt, entry.type, entry.mode]]
  });
}

async function deleteRow(id) {
  // 행 번호 찾기
  const res = await sheetsRequest('GET', '/values/entries!A:A');
  const rows = res.values || [];
  const rowIdx = rows.findIndex(r => r[0] == id);
  if (rowIdx < 0) return;
  const sheetRes = await sheetsRequest('GET', '');
  const sheetId = sheetRes.sheets[0].properties.sheetId;
  await sheetsRequest('POST', ':batchUpdate', {
    requests: [{ deleteDimension: {
      range: { sheetId, dimension:'ROWS', startIndex: rowIdx, endIndex: rowIdx+1 }
    }}]
  });
}

/* ── App Logic ── */
function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-' + id).classList.add('active');
  const idx = {rec:0, hist:1, flow:2, alloc:3, goal:4}[id];
  document.querySelectorAll('.bn')[idx].classList.add('on');
  if (id === 'hist')  renderHist();
  if (id === 'flow')  renderFlow();
  if (id === 'alloc') renderAlloc();
  if (id === 'goal')  renderGoal();
}

function renderCurrent() {
  const cur = document.querySelector('.page.active').id.replace('pg-','');
  if (cur === 'hist')  renderHist();
  if (cur === 'flow')  renderFlow();
  if (cur === 'alloc') renderAlloc();
  if (cur === 'goal')  renderGoal();
}

function setT(t, el) {
  tradeType = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function setMode(m, el) {
  inputMode = m;
  document.querySelectorAll('.seg .sb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderDateArea();
}

function renderDateArea() {
  const el = document.getElementById('date-area');
  if (inputMode === 'year') {
    el.innerHTML = `<div class="fl" style="margin-bottom:12px;"><label>연도</label>
      <select id="f-yr">${[2018,2019,2020,2021,2022,2023,2024].map(y=>`<option>${y}</option>`).join('')}</select></div>`;
  } else if (inputMode === 'month') {
    el.innerHTML = `<div class="r2" style="margin-bottom:12px;">
      <div class="fl"><label>연도</label><input type="number" id="f-yr" value="2025" min="2025" max="2025" inputmode="numeric"></div>
      <div class="fl"><label>월</label><select id="f-mo">${Array.from({length:12},(_,i)=>`<option value="${String(i+1).padStart(2,'0')}">${i+1}월</option>`).join('')}</select></div>
    </div>`;
  } else {
    const td = new Date().toISOString().slice(0,10);
    el.innerHTML = `<div class="fl" style="margin-bottom:12px;"><label>날짜</label>
      <input type="date" id="f-day" value="${td}" min="2026-01-01"></div>`;
  }
}
renderDateArea();

function getDateKey() {
  if (inputMode === 'year')  return document.getElementById('f-yr').value;
  if (inputMode === 'month') {
    const yr = document.getElementById('f-yr').value || '2025';
    const mo = document.getElementById('f-mo').value;
    return `${yr}-${mo}`;
  }
  return document.getElementById('f-day').value;
}

async function saveEntry() {
  const amt   = parseFloat(document.getElementById('f-amt').value) || 0;
  const asset = document.getElementById('f-asset').value;
  if (!amt) { showMsg('금액을 입력해주세요', true); return; }
  const entry = { id: Date.now(), dk: getDateKey(), asset, amt, type: tradeType, mode: inputMode };
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await appendRow(entry);
    entries.push(entry);
    entries.sort((a,b) => a.dk.localeCompare(b.dk));
    document.getElementById('f-amt').value = '';
    showMsg('✓ 저장되었습니다');
    setSyncState('ok', '저장 완료');
  } catch(e) {
    showMsg('저장 실패 — 연결을 확인해주세요', true);
    setSyncState('err', '저장 실패');
  }
  btn.disabled = false; btn.textContent = '저장';
}

function showMsg(txt, isErr=false) {
  const el = document.getElementById('smsg');
  el.textContent = txt;
  el.className = 'smsg' + (isErr ? ' errmsg' : '');
  setTimeout(() => el.textContent = '', 3000);
}

function hf(f, el) {
  histFilter = f;
  document.querySelectorAll('#hist-filters .fbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderHist();
}

async function delEntry(id) {
  if (!confirm('삭제할까요?')) return;
  setSyncState('loading', '삭제 중...');
  try {
    await deleteRow(id);
    entries = entries.filter(e => e.id !== id);
    renderHist();
    setSyncState('ok', '삭제 완료');
  } catch(e) {
    setSyncState('err', '삭제 실패');
  }
}

function fmtFull(n) {
  const v = Math.round(Number(n));
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(1) + '억원';
  if (Math.abs(v) >= 10000)     return Math.round(v/10000) + '만원';
  return v.toLocaleString() + '원';
}
function fmtShort(n) {
  const v = Math.round(Number(n));
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(1) + '억';
  if (Math.abs(v) >= 10000)     return Math.round(v/10000) + '만';
  return v.toLocaleString();
}

function assetPill(a) {
  const m = {주식:'p-stock', 코인:'p-coin', ETF:'p-etf'};
  return `<span class="pill ${m[a]}">${a}</span>`;
}

function renderHist() {
  let list = [...entries];
  if (['주식','코인','ETF'].includes(histFilter)) list = list.filter(e => e.asset === histFilter);
  else if (['매수','매도'].includes(histFilter))  list = list.filter(e => e.type  === histFilter);
  list.reverse();
  const el = document.getElementById('hist-list');
  if (!list.length) { el.innerHTML = '<div class="empty">내역이 없어요</div>'; return; }
  el.innerHTML = list.map(e => `
    <div class="eitem">
      <div style="flex:1;">
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:5px;">
          ${assetPill(e.asset)}
          <span class="pill ${e.type==='매수'?'p-buy':'p-sell'}">${e.type}</span>
        </div>
        <div class="eamt" style="color:${e.type==='매수'?'var(--text)':'var(--sell)'};">
          ${e.type==='매도'?'−':''}${fmtFull(e.amt)}
        </div>
        <div class="edk">${e.dk}</div>
      </div>
      <button class="delbtn" onclick="delEntry(${e.id})">×</button>
    </div>`).join('');
}

function getYrData() {
  const years = [...new Set(entries.map(e => e.dk.slice(0,4)))].sort();
  const r = {};
  years.forEach(y => { r[y] = {buy:{주식:0,코인:0,ETF:0}, sell:{주식:0,코인:0,ETF:0}}; });
  entries.forEach(e => {
    const y = e.dk.slice(0,4);
    r[y][e.type==='매수'?'buy':'sell'][e.asset] += e.amt;
  });
  return { years, r };
}

function destroyC(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

const GRID = { color: 'rgba(255,255,255,0.04)' };
const TICK = { color: '#444', font: { size: 10 } };

function renderFlow() {
  destroyC('flow'); destroyC('net');
  const { years, r } = getYrData();
  const totBuy  = entries.filter(e=>e.type==='매수').reduce((a,e)=>a+e.amt,0);
  const totSell = entries.filter(e=>e.type==='매도').reduce((a,e)=>a+e.amt,0);
  const net     = totBuy - totSell;
  document.getElementById('flow-metrics').innerHTML = `
    <div class="mcard"><div class="mlabel">총 매수</div><div class="mval">${fmtFull(totBuy)}</div></div>
    <div class="mcard"><div class="mlabel">총 매도</div><div class="mval">${fmtFull(totSell)}</div></div>
    <div class="mcard"><div class="mlabel">순투자</div><div class="mval ${net>=0?'pos':'neg'}">${fmtFull(net)}</div></div>
    <div class="mcard"><div class="mlabel">기록 수</div><div class="mval">${entries.length}건</div></div>`;
  if (!years.length) return;
  let cb=0, cs=0;
  const cbs=[], css2=[];
  years.forEach(y => {
    cb += Object.values(r[y].buy).reduce((a,v)=>a+v,0);
    cs += Object.values(r[y].sell).reduce((a,v)=>a+v,0);
    cbs.push(Math.round(cb)); css2.push(Math.round(cs));
  });
  charts['flow'] = new Chart(document.getElementById('c-flow'), {
    type:'line',
    data:{labels:years,datasets:[
      {data:cbs, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.06)', tension:0.35, fill:true, borderWidth:2, pointRadius:3, pointBackgroundColor:'#60a5fa'},
      {data:css2,borderColor:'#f87171', backgroundColor:'rgba(248,113,113,0.04)', tension:0.35, fill:true, borderWidth:2, pointRadius:3, pointBackgroundColor:'#f87171', borderDash:[5,4]}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{...TICK, callback:v=>fmtShort(v)}, grid:GRID, border:{display:false}},
      x:{ticks:{...TICK, autoSkip:false, maxRotation:45}, grid:{display:false}, border:{display:false}}
    }}
  });
  const nv = years.map(y => Math.round(
    Object.values(r[y].buy).reduce((a,v)=>a+v,0) - Object.values(r[y].sell).reduce((a,v)=>a+v,0)
  ));
  charts['net'] = new Chart(document.getElementById('c-net'), {
    type:'bar',
    data:{labels:years,datasets:[{data:nv,backgroundColor:nv.map(v=>v>=0?'rgba(52,211,153,0.65)':'rgba(248,113,113,0.65)'),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      y:{ticks:{...TICK, callback:v=>fmtShort(v)}, grid:GRID, border:{display:false}},
      x:{ticks:{...TICK, autoSkip:false, maxRotation:45}, grid:{display:false}, border:{display:false}}
    }}
  });
}

function renderAlloc() {
  destroyC('alloc'); destroyC('pie');
  const { years, r } = getYrData();
  if (!years.length) {
    document.getElementById('timeline').innerHTML = '<div class="empty">데이터 없음</div>';
    return;
  }
  charts['alloc'] = new Chart(document.getElementById('c-alloc'), {
    type:'bar',
    data:{labels:years,datasets:[
      {label:'주식',data:years.map(y=>Math.round(r[y].buy['주식'])),backgroundColor:'rgba(96,165,250,0.75)',borderRadius:3,stack:'a'},
      {label:'코인',data:years.map(y=>Math.round(r[y].buy['코인'])),backgroundColor:'rgba(167,139,250,0.75)',borderRadius:3,stack:'a'},
      {label:'ETF', data:years.map(y=>Math.round(r[y].buy['ETF'])), backgroundColor:'rgba(52,211,153,0.75)', borderRadius:3,stack:'a'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{stacked:true,ticks:{...TICK,autoSkip:false,maxRotation:45},grid:{display:false},border:{display:false}},
      y:{stacked:true,ticks:{...TICK,callback:v=>fmtShort(v)},grid:GRID,border:{display:false}}
    }}
  });
  const ts = entries.filter(e=>e.type==='매수'&&e.asset==='주식').reduce((a,e)=>a+e.amt,0);
  const tc = entries.filter(e=>e.type==='매수'&&e.asset==='코인').reduce((a,e)=>a+e.amt,0);
  const te = entries.filter(e=>e.type==='매수'&&e.asset==='ETF').reduce((a,e)=>a+e.amt,0);
  charts['pie'] = new Chart(document.getElementById('c-pie'), {
    type:'doughnut',
    data:{labels:['주식','코인','ETF'],datasets:[{data:[Math.round(ts),Math.round(tc),Math.round(te)],backgroundColor:['#60a5fa','#a78bfa','#34d399'],borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:'#888',font:{size:11},padding:16,usePointStyle:true,pointStyleWidth:8}}}}
  });
  document.getElementById('timeline').innerHTML = '<div class="empty">코멘트가 있는 항목이 표시됩니다</div>';
}

function saveGoal() {
  goal = {
    target:  parseFloat(document.getElementById('g-target').value)  || 0,
    current: parseFloat(document.getElementById('g-current').value) || 0,
    year:    document.getElementById('g-year').value
  };
  localStorage.setItem(GOAL_KEY, JSON.stringify(goal));
  renderGoal();
}

function saveAlloc() {
  allocGoal = {
    stock: parseFloat(document.getElementById('g-stock').value) || 0,
    coin:  parseFloat(document.getElementById('g-coin').value)  || 0,
    etf:   parseFloat(document.getElementById('g-etf').value)   || 0
  };
  localStorage.setItem(ALLOC_KEY, JSON.stringify(allocGoal));
  renderGoal();
}

function renderGoal() {
  if (goal.target) {
    document.getElementById('g-target').value  = goal.target  || '';
    document.getElementById('g-current').value = goal.current || '';
    document.getElementById('g-year').value    = goal.year    || '';
    const pct    = Math.min(100, Math.round((goal.current / goal.target) * 100));
    const remain = goal.target - goal.current;
    document.getElementById('goal-content').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);">달성률</span>
        <span style="font-family:var(--mono);font-size:28px;color:${pct>=70?'var(--buy)':'var(--text)'};">${pct}<span style="font-size:14px;">%</span></span>
      </div>
      <div class="gbar-bg"><div class="gbar-fill" style="width:${pct}%;"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:14px;">
        <span>${fmtFull(goal.current)}</span><span>${fmtFull(goal.target)}</span>
      </div>
      <div style="background:var(--bg3);border-radius:var(--r-md);padding:14px;">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px;">남은 금액</div>
        <div style="font-family:var(--mono);font-size:20px;">${remain > 0 ? fmtFull(remain) : '🎯 달성!'}</div>
        ${goal.year ? `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;">목표 ${goal.year}년</div>` : ''}
      </div>`;
  }
  if (Object.keys(allocGoal).length) {
    if (allocGoal.stock !== undefined) document.getElementById('g-stock').value = allocGoal.stock;
    if (allocGoal.coin  !== undefined) document.getElementById('g-coin').value  = allocGoal.coin;
    if (allocGoal.etf   !== undefined) document.getElementById('g-etf').value   = allocGoal.etf;
    const totBuy = entries.filter(e=>e.type==='매수').reduce((a,e)=>a+e.amt,0) || 1;
    const cur = {
      stock: Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='주식').reduce((a,e)=>a+e.amt,0)/totBuy*100),
      coin:  Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='코인').reduce((a,e)=>a+e.amt,0)/totBuy*100),
      etf:   Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='ETF').reduce((a,e)=>a+e.amt,0)/totBuy*100)
    };
    const rows = [['주식','stock','#60a5fa'],['코인','coin','#a78bfa'],['ETF','etf','#34d399']];
    document.getElementById('alloc-compare').innerHTML = rows.map(([lbl,k,col]) => {
      const diff = cur[k] - (allocGoal[k] || 0);
      return `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;margin-bottom:5px;">
          <span style="color:var(--text2);">${lbl}</span>
          <span style="color:var(--text2);">현재 ${cur[k]}%
            <span style="color:${diff>0?'var(--buy)':diff<0?'var(--sell)':'var(--text3)'};">${diff>0?'+':''}${diff}%</span>
            / 목표 ${allocGoal[k]||0}%
          </span>
        </div>
        <div class="abar-bg"><div class="abar-fill" style="width:${cur[k]}%;background:${col};"></div></div>
      </div>`;
    }).join('');
  }
}

/* ── Init ── */
async function init() {
  try {
    await loadFromSheet();
    setSyncState('ok', '연결됨');
  } catch(e) {
    setSyncState('err', '연결 실패');
    console.error('초기 로드 실패:', e);
  }
  renderGoal();
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    ov.classList.add('hide');
    setTimeout(() => ov.remove(), 400);
  }, 1200);
}

init();
</script>
