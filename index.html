<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pablo Invest">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231a1a2e'/%3E%3Ctext x='90' y='115' font-family='Georgia,serif' font-size='72' font-weight='bold' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
<title>Pablo Invest Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f8f8f6;
  --bg2:     #ffffff;
  --bg3:     #f2f2ef;
  --bg4:     #e8e8e4;
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text:    #1a1a1a;
  --text2:   #666;
  --text3:   #aaa;
  --stock:   #1d6fdb;
  --coin:    #7c3aed;
  --etf:     #059669;
  --dom:     #d97706;
  --ovs:     #db2777;
  --buy:     #059669;
  --sell:    #dc2626;
  --acc:     #1a1a2e;
  --acc2:    #2d2d4e;
  --acc-lt:  #f0f0ff;
  --mono:    'DM Mono', monospace;
  --serif:   'DM Serif Display', Georgia, serif;
  --sans:    'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  --r:       12px;
  --rl:      18px;
  --shadow:  0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none;-webkit-overflow-scrolling:touch;}

.shell{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg);}

/* TOPBAR */
.topbar{padding:env(safe-area-inset-top,16px) 20px 14px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;}
.app-title-wrap{display:flex;flex-direction:column;gap:1px;}
.app-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.18em;text-transform:uppercase;}
.app-title{font-family:var(--serif);font-size:26px;color:var(--acc);line-height:1;letter-spacing:-0.01em;}
.sync-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:6px 12px;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
.sync-pill:active{opacity:0.7;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sdot.ok{background:var(--buy);box-shadow:0 0 6px rgba(5,150,105,0.5);}
.sdot.err{background:var(--sell);}
.sdot.spin{background:#d97706;animation:bl 0.8s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.25}}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px 100px;display:none;-webkit-overflow-scrolling:touch;}
.page.active{display:block;}

/* BOTTOM NAV */
.bnav{flex-shrink:0;display:flex;border-top:0.5px solid var(--border);background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100;padding-bottom:env(safe-area-inset-bottom,6px);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 5px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:9px;font-family:var(--sans);letter-spacing:0.04em;transition:color 0.2s;}
.bn.on{color:var(--acc);}
.bn svg{width:19px;height:19px;stroke:currentColor;}

/* CARD */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px 15px;margin-bottom:11px;box-shadow:var(--shadow);}
.clabel{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:11px;}

/* SECTION HEADER */
.sec-hd{font-family:var(--serif);font-size:18px;color:var(--acc);margin:20px 0 10px 2px;}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.mc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 13px;box-shadow:var(--shadow);}
.ml{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.mv{font-family:var(--mono);font-size:16px;color:var(--text);font-weight:500;}
.mv.pos{color:var(--buy);}
.mv.neg{color:var(--sell);}

/* FORM */
.trow{display:flex;gap:8px;margin-bottom:14px;}
.tbtn{flex:1;padding:13px;font-size:14px;font-weight:500;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;background:none;color:var(--text3);font-family:var(--sans);transition:all 0.2s;}
.tbtn.buy.on{background:#ecfdf5;border-color:var(--buy);color:var(--buy);}
.tbtn.sell.on{background:#fef2f2;border-color:var(--sell);color:var(--sell);}

.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.fl label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
.fl input,.fl select{font-size:15px;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);width:100%;font-family:var(--sans);-webkit-appearance:none;appearance:none;outline:none;transition:border-color 0.2s,background 0.2s;}
.fl input:focus,.fl select:focus{border-color:var(--acc);background:var(--bg2);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* AMT INPUT with comma display */
.amt-wrap{position:relative;}
.amt-display{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text);pointer-events:none;font-family:var(--sans);}
.amt-input-hidden{opacity:0;position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;}
.amt-real{font-size:15px;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);width:100%;font-family:var(--sans);outline:none;transition:border-color 0.2s;-webkit-appearance:none;appearance:none;}
.amt-real:focus{border-color:var(--acc);background:var(--bg2);}

.sbtn{width:100%;padding:14px;font-size:14px;font-weight:600;background:var(--acc);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--sans);letter-spacing:0.02em;transition:opacity 0.2s;box-shadow:0 4px 14px rgba(26,26,46,0.2);}
.sbtn:active{opacity:0.8;}
.sbtn.ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);box-shadow:none;}
.smsg{font-family:var(--mono);font-size:10px;color:var(--buy);text-align:center;margin-top:8px;min-height:14px;letter-spacing:0.04em;}
.errmsg{color:var(--sell);}
.divider{height:1px;background:var(--bg3);margin:4px 0 14px;}

/* ASSET SELECTOR STEPS */
.step-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:7px;}
.step-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:7px 14px;font-size:12px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:none;color:var(--text3);font-family:var(--sans);transition:all 0.2s;white-space:nowrap;}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;}

/* BROKER INPUT */
.broker-wrap{margin-bottom:11px;}

/* LIST */
.eitem{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border);}
.eitem:last-child{border-bottom:none;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-family:var(--mono);letter-spacing:0.05em;font-weight:500;}
.p-stock{background:#dbeafe;color:var(--stock);}
.p-coin{background:#ede9fe;color:var(--coin);}
.p-etf{background:#d1fae5;color:var(--etf);}
.p-buy{background:#d1fae5;color:var(--buy);}
.p-sell{background:#fee2e2;color:var(--sell);}
.p-dom{background:#fef3c7;color:var(--dom);}
.p-ovs{background:#fce7f3;color:var(--ovs);}
.eamt{font-family:var(--mono);font-size:17px;font-weight:500;margin-top:5px;color:var(--text);}
.eamt.sell-amt{color:var(--sell);}
.edk{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px;}
.ebroker{font-size:11px;color:var(--text3);margin-top:2px;}
.delbtn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:0 4px;line-height:1;flex-shrink:0;}
.delbtn:active{color:var(--sell);}

/* FILTER */
.fscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.fscroll::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:5px 13px;font-size:10px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:none;color:var(--text3);font-family:var(--mono);white-space:nowrap;transition:all 0.2s;}
.fbtn.on{background:var(--acc);border-color:var(--acc);color:#fff;}

/* CHARTS */
.cwrap{position:relative;width:100%;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.legend span{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-family:var(--mono);}
.legend i{width:7px;height:7px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* GOAL */
.gbar-bg{height:6px;background:var(--bg3);border-radius:3px;margin:8px 0 4px;overflow:hidden;}
.gbar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width 0.8s cubic-bezier(.34,1.56,.64,1);}
.abar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.abar-fill{height:4px;border-radius:2px;}

.empty{text-align:center;color:var(--text3);font-size:12px;padding:36px 0;font-family:var(--mono);}
select option{background:#fff;color:var(--text);}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s;}
.overlay.hide{opacity:0;pointer-events:none;}
.ov-title{font-family:var(--serif);font-size:32px;color:var(--acc);margin-bottom:6px;}
.ov-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.15em;margin-bottom:28px;}
.ov-bar{width:80px;height:1px;background:var(--bg4);overflow:hidden;border-radius:1px;}
.ov-fill{height:1px;background:var(--acc);animation:pr 1.4s ease forwards;}
@keyframes pr{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="ov-title">Pablo</div>
  <div class="ov-sub">INVEST LOG</div>
  <div class="ov-bar"><div class="ov-fill"></div></div>
</div>

<div class="shell">
  <div class="topbar">
    <div class="app-title-wrap">
      <span class="app-sub">Personal</span>
      <span class="app-title">Pablo Invest Log</span>
    </div>
    <div class="sync-pill" onclick="syncNow()" id="sync-pill">
      <div class="sdot" id="sdot"></div>
      <span id="stxt">연결 중...</span>
    </div>
  </div>

  <div class="pages">

    <!-- 기록 -->
    <div class="page active" id="pg-rec">
      <div class="sec-hd">거래 기록</div>

      <div class="card">
        <div class="clabel">거래 유형</div>
        <div class="trow">
          <button class="tbtn buy on" onclick="setT('매수',this)">▲ 매수</button>
          <button class="tbtn sell"   onclick="setT('매도',this)">▼ 매도</button>
        </div>

        <div class="clabel">날짜</div>
        <div id="date-area" style="margin-bottom:4px;"></div>
        <div class="divider"></div>

        <!-- STEP 1: 국내/해외 -->
        <div class="step-label">① 국내 / 해외</div>
        <div class="step-chips" id="chips-region">
          <button class="chip on" onclick="setChip('region','국내',this)">🇰🇷 국내</button>
          <button class="chip"    onclick="setChip('region','해외',this)">🌐 해외</button>
        </div>

        <!-- STEP 2: 자산 종류 -->
        <div class="step-label">② 자산 종류</div>
        <div class="step-chips" id="chips-asset">
          <button class="chip on" onclick="setChip('asset','주식',this)">주식</button>
          <button class="chip"    onclick="setChip('asset','코인',this)">코인</button>
          <button class="chip"    onclick="setChip('asset','ETF',this)">ETF</button>
        </div>

        <!-- STEP 3: 거래소 -->
        <div class="step-label">③ 거래소</div>
        <div class="step-chips" id="chips-broker" style="margin-bottom:6px;"></div>
        <div class="fl broker-wrap">
          <label>직접 입력 (선택)</label>
          <input type="text" id="f-broker-custom" placeholder="기타 거래소명">
        </div>

        <div class="divider"></div>

        <!-- 금액 -->
        <div class="fl">
          <label>금액 (원)</label>
          <input class="amt-real" type="text" id="f-amt" inputmode="numeric" placeholder="0" oninput="fmtAmt(this)">
        </div>

        <button class="sbtn" onclick="saveEntry()" id="save-btn">저장</button>
        <div class="smsg" id="smsg"></div>
      </div>
    </div>

    <!-- 내역 -->
    <div class="page" id="pg-hist">
      <div class="sec-hd">거래 내역</div>
      <div class="fscroll" id="hist-filters">
        <button class="fbtn on" onclick="hf('전체',this)">전체</button>
        <button class="fbtn" onclick="hf('국내',this)">국내</button>
        <button class="fbtn" onclick="hf('해외',this)">해외</button>
        <button class="fbtn" onclick="hf('주식',this)">주식</button>
        <button class="fbtn" onclick="hf('코인',this)">코인</button>
        <button class="fbtn" onclick="hf('ETF',this)">ETF</button>
        <button class="fbtn" onclick="hf('매수',this)">매수</button>
        <button class="fbtn" onclick="hf('매도',this)">매도</button>
      </div>
      <div class="card" id="hist-list"><div class="empty">내역 없음</div></div>
    </div>

    <!-- 흐름 -->
    <div class="page" id="pg-flow">
      <div class="sec-hd">자산 흐름</div>
      <div class="mgrid" id="flow-metrics"></div>
      <div class="card">
        <div class="clabel">누적 매수 vs 매도</div>
        <div class="legend">
          <span><i style="background:var(--acc);"></i>매수</span>
          <span><i style="background:var(--sell);"></i>매도</span>
        </div>
        <div class="cwrap" style="height:170px;"><canvas id="c-flow">누적 흐름</canvas></div>
      </div>
      <div class="card">
        <div class="clabel">연간 순투자액</div>
        <div class="cwrap" style="height:155px;"><canvas id="c-net">순투자</canvas></div>
      </div>
    </div>

    <!-- 배분 -->
    <div class="page" id="pg-alloc">
      <div class="sec-hd">포트폴리오 배분</div>
      <div class="card">
        <div class="clabel">자산별 연도별 매수</div>
        <div class="legend">
          <span><i style="background:var(--stock);"></i>주식</span>
          <span><i style="background:var(--coin);"></i>코인</span>
          <span><i style="background:var(--etf);"></i>ETF</span>
        </div>
        <div class="cwrap" style="height:170px;"><canvas id="c-alloc">배분</canvas></div>
      </div>
      <div class="card">
        <div class="clabel">국내 vs 해외</div>
        <div class="cwrap" style="height:165px;"><canvas id="c-region">지역</canvas></div>
      </div>
      <div class="card">
        <div class="clabel">전체 자산 비중</div>
        <div class="cwrap" style="height:165px;"><canvas id="c-pie">비중</canvas></div>
      </div>
    </div>

    <!-- 목표 -->
    <div class="page" id="pg-goal">
      <div class="sec-hd">투자 목표</div>
      <div class="card">
        <div class="clabel">목표 설정</div>
        <div class="fl"><label>목표 총자산 (원)</label><input type="text" id="g-target" placeholder="500,000,000" inputmode="numeric" oninput="fmtAmt(this)"></div>
        <div class="fl"><label>현재 평가금액 (원)</label><input type="text" id="g-current" placeholder="0" inputmode="numeric" oninput="fmtAmt(this)"></div>
        <div class="fl" style="margin-bottom:14px;"><label>목표 달성 연도</label><input type="number" id="g-year" placeholder="2030" inputmode="numeric"></div>
        <button class="sbtn" onclick="saveGoal()">저장</button>
      </div>
      <div class="card">
        <div class="clabel">달성 현황</div>
        <div id="goal-content"><div class="empty">목표를 설정해주세요</div></div>
      </div>
      <div class="card">
        <div class="clabel">목표 배분 전략</div>
        <div class="r3" style="margin-bottom:14px;">
          <div class="fl"><label>주식 %</label><input type="number" id="g-stock" placeholder="50" inputmode="numeric"></div>
          <div class="fl"><label>코인 %</label><input type="number" id="g-coin" placeholder="30" inputmode="numeric"></div>
          <div class="fl"><label>ETF %</label><input type="number" id="g-etf" placeholder="20" inputmode="numeric"></div>
        </div>
        <button class="sbtn ghost" onclick="saveAlloc()">저장</button>
        <div id="alloc-compare" style="margin-top:16px;"></div>
      </div>
    </div>

  </div><!-- /pages -->

  <div class="bnav">
    <button class="bn on" onclick="go('rec')">
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>기록
    </button>
    <button class="bn" onclick="go('hist')">
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 11h16M4 16h10"/></svg>내역
    </button>
    <button class="bn" onclick="go('flow')">
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 17l5-5 4 4 9-10"/></svg>흐름
    </button>
    <button class="bn" onclick="go('alloc')">
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9l4 4"/></svg>배분
    </button>
    <button class="bn" onclick="go('goal')">
      <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>목표
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* =====================================================
   ⚠️  메모장으로 열어서 아래 세 줄을 수정하세요
   ===================================================== */
const CONFIG = {

/* Google Sheets JWT */
async function getToken(){
  const now=Math.floor(Date.now()/1000);
  const b64=s=>btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const u=b64({alg:'RS256',typ:'JWT'})+'.'+b64({iss:CONFIG.CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
  const pem=CONFIG.PRIVATE_KEY.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  const k=await crypto.subtle.importKey('pkcs8',Uint8Array.from(atob(pem),c=>c.charCodeAt(0)),{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign({name:'RSASSA-PKCS1-v1_5'},k,new TextEncoder().encode(u));
  const jwt=u+'.'+btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const d=await r.json();if(!d.access_token)throw new Error('token fail');return d.access_token;
}
async function sReq(method,path,body){
  const t=await getToken();
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}${path}`,{method,headers:{'Authorization':`Bearer ${t}`,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(`Sheets ${r.status}: ${e}`);}
  return r.json();
}

async function loadSheet(){
  const r=await sReq('GET','/values/entries!A2:H10000');
  entries=(r.values||[]).filter(r=>r[0]).map(r=>({
    id:parseInt(r[0])||Date.now(),dk:r[1]||'',asset:r[2]||'주식',
    region:r[3]||'국내',broker:r[4]||'',amt:parseFloat(r[5])||0,
    type:r[6]||'매수',mode:r[7]||'year'
  })).sort((a,b)=>a.dk.localeCompare(b.dk));
}
async function appendRow(e){
  await sReq('POST',`/values/entries!A:H:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
    {values:[[e.id,e.dk,e.asset,e.region,e.broker,e.amt,e.type,e.mode]]});
}
async function deleteRow(id){
  const r=await sReq('GET','/values/entries!A:A');
  const idx=(r.values||[]).findIndex(r=>String(r[0])===String(id));
  if(idx<0)return;
  const sr=await sReq('GET','');
  await sReq('POST',':batchUpdate',{requests:[{deleteDimension:{range:{sheetId:sr.sheets[0].properties.sheetId,dimension:'ROWS',startIndex:idx,endIndex:idx+1}}}]});
}

function renderGoal(){
  if(goal.target){
    const gtel=document.getElementById('g-target');if(gtel)gtel.value=goal.target?goal.target.toLocaleString():'';
    const gcel=document.getElementById('g-current');if(gcel)gcel.value=goal.current?goal.current.toLocaleString():'';
    const gyel=document.getElementById('g-year');if(gyel)gyel.value=goal.year||'';
    const pct=Math.min(100,Math.round((goal.current/goal.target)*100));
    const remain=goal.target-goal.current;
    document.getElementById('goal-content').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);">달성률</span>
        <span style="font-family:var(--serif);font-size:34px;color:${pct>=70?'var(--buy)':'var(--acc)'};">${pct}%</span>
      </div>
      <div class="gbar-bg"><div class="gbar-fill" style="width:${pct}%;"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:14px;"><span>${fmtF(goal.current)}</span><span>${fmtF(goal.target)}</span></div>
      <div style="background:var(--bg3);border-radius:var(--r);padding:14px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:0.1em;">남은 금액</div>
        <div style="font-family:var(--mono);font-size:20px;font-weight:500;">${remain>0?fmtF(remain):'🎯 달성!'}</div>
        ${goal.year?`<div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;">목표 ${goal.year}년</div>`:''}
      </div>`;
  }
  if(Object.keys(allocGoal).length){
    ['stock','coin','etf'].forEach(k=>{const el=document.getElementById('g-'+k);if(el&&allocGoal[k]!==undefined)el.value=allocGoal[k];});
    const totB=entries.filter(e=>e.type==='매수').reduce((a,e)=>a+e.amt,0)||1;
    const cur={stock:Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='주식').reduce((a,e)=>a+e.amt,0)/totB*100),coin:Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='코인').reduce((a,e)=>a+e.amt,0)/totB*100),etf:Math.round(entries.filter(e=>e.type==='매수'&&e.asset==='ETF').reduce((a,e)=>a+e.amt,0)/totB*100)};
    document.getElementById('alloc-compare').innerHTML=[['주식','stock','#1d6fdb'],['코인','coin','#7c3aed'],['ETF','etf','#059669']].map(([lbl,k,col])=>{
      const diff=cur[k]-(allocGoal[k]||0);
      return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;margin-bottom:5px;"><span style="color:var(--text2);">${lbl}</span><span style="color:var(--text2);">현재 ${cur[k]}% <span style="color:${diff>0?'var(--buy)':diff<0?'var(--sell)':'var(--text3)'};">${diff>0?'+':''}${diff}%</span> / 목표 ${allocGoal[k]||0}%</span></div><div class="abar-bg"><div class="abar-fill" style="width:${cur[k]}%;background:${col};"></div></div></div>`;
    }).join('');
  }
}

async function init(){
  renderDA();
  renderBrokerChips();
  try{await loadSheet();setSS('ok','연결됨');}
  catch(e){setSS('err','연결 실패');console.error('Init error:',e);}
  renderGoal();
  setTimeout(()=>{const ov=document.getElementById('overlay');ov.classList.add('hide');setTimeout(()=>ov.remove(),500);},1400);
}
init();
</script>
